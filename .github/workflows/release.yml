name: Release

on:
  push:
    branches:
      - release
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version to publish, for example 1.0.1. If empty, uses major.minor.run_number."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build, package and publish
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content src/5W2H.App.csproj
          $baseVersion = ($project.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
          $inputVersion = "${{ github.event.inputs.version || '' }}"
          $version = if ([string]::IsNullOrWhiteSpace($inputVersion)) {
            $base = [System.Version]$baseVersion
            "$($base.Major).$($base.Minor).${{ github.run_number }}"
          } else {
            $inputVersion
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore 5W2H-Management.sln --runtime win-x64 -p:Configuration=Release -p:SelfContained=true -p:PublishReadyToRun=true -p:Version=${{ steps.version.outputs.version }}

      - name: Build
        run: dotnet build 5W2H-Management.sln --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test 5W2H-Management.sln --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Publish app
        run: dotnet publish src/5W2H.App.csproj --configuration Release --runtime win-x64 --self-contained true --no-restore -p:Version=${{ steps.version.outputs.version }} -o publish

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk --version 0.0.1298

      - name: Download previous Velopack release
        shell: pwsh
        run: |
          vpk download github --repoUrl "https://github.com/${{ github.repository }}" --token "${{ secrets.GITHUB_TOKEN }}"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No previous Velopack release found. Continuing with a full package only."
            exit 0
          }

      - name: Pack Velopack release
        run: >
          vpk pack
          --packId 5W2H-Management
          --packVersion ${{ steps.version.outputs.version }}
          --packDir publish
          --mainExe 5W2H-Management.exe
          --outputDir Releases
          --packTitle "5W2H Management"
          --packAuthors "Asael Renan"
          --releaseNotes RELEASE_NOTES.md

      - name: Upload GitHub release
        run: >
          vpk upload github
          --repoUrl "https://github.com/${{ github.repository }}"
          --token "${{ secrets.GITHUB_TOKEN }}"
          --outputDir Releases
          --publish
          --releaseName "5W2H Management ${{ steps.version.outputs.version }}"
          --tag "v${{ steps.version.outputs.version }}"
